  .go-btn { padding: 5px 11px; font-size: 11.5px; font-weight: 700; border-radius: 3px; cursor: pointer; margin-left: 2px; }
  .log-wrap { padding: 8px 12px 13px; }

  .log { height: 120px; overflow-y: auto; font-size: 10.5px; line-height: 1.6; padding: 9px; border-radius: 4px; }

  .dir-override .tb { background: #0a0c0e; border-bottom: 1px solid #11201f; }
  .dir-override .tb-text { color: #2a6a66; letter-spacing: 1px; }
  .dir-override .tb-dots span { border-radius: 0; }
  .dir-override .d-close { background: #ff3da6; } .dir-override .d-min { background: #e0c83a; } .dir-override .d-max { background: #2ee6d6; }
  .dir-override .hd { background: #070809; border-bottom: 1px solid #11201f; }
  .dir-override .hd-title { color: #2ee6d6; letter-spacing: 3px; text-shadow: 0 0 9px rgba(46,230,214,.5); }
  .dir-override .status .dot, .dir-override .status .stxt { color: #2ee6d6; }
  .dir-override .ent { background: #0a0c0e; border-bottom: 1px solid #11201f; }
  .dir-override .find-btn { background: transparent; color: #2ee6d6; border: 1px solid #2ee6d6; }
  .dir-override .find-btn:hover { background: rgba(46,230,214,.12); box-shadow: 0 0 12px rgba(46,230,214,.3); }
  .dir-override .ent-lbl { color: #2ee6d6; }
  .dir-override .sect { background: #090b0d; color: #2a6a66; border-bottom: 1px solid #11201f; }
  .dir-override .stats { background: #070809; border-bottom: 1px solid #11201f; }
  .dir-override .bar { background: #11201f; border-radius: 0; }
  .dir-override .bar-fill { border-radius: 0; }
  .dir-override .bar-fill.hp { background: linear-gradient(90deg, #4ade80, #a3ff5e); box-shadow: 0 0 8px rgba(120,255,120,.4); }
  .dir-override .bar-fill.sta { background: linear-gradient(90deg, #2ee6d6, #5af0ff); box-shadow: 0 0 8px rgba(46,230,214,.4); }
  .dir-override .bar-fill.spi { background: linear-gradient(90deg, #ff3da6, #ff7ac6); box-shadow: 0 0 8px rgba(255,61,166,.4); }
  .dir-override .stat-lbl { color: #2ee6d6; } .dir-override .stat-val { color: #2a8a82; }
  .dir-override .cheats { background: #090b0d; border-bottom: 1px solid #11201f; }
  .dir-override .divider::before, .dir-override .divider::after { background: #173433; }
  .dir-override .divider span { color: #ff3da6; }
  .dir-override .cheat-btn, .dir-override .speed-btn { background: #0c0f11; color: #8ad6cf; border: 1px solid #173433; border-radius: 2px; }
  .dir-override .cheat-btn:hover, .dir-override .speed-btn:hover { background: #0f1517; border-color: #235755; }
  .dir-override .cheat-btn .ind, .dir-override .speed-btn .ind { color: #2a6a66; }
  .dir-override .cheat-btn.active, .dir-override .speed-btn.active { background: rgba(46,230,214,.12); border-color: #2ee6d6; color: #2ee6d6; box-shadow: 0 0 10px rgba(46,230,214,.25), inset 0 0 10px rgba(46,230,214,.08); }
  .dir-override .cheat-btn.active .ind, .dir-override .speed-btn.active .ind { color: #2ee6d6; }
  .dir-override .hk, .dir-override .speed-hk { color: #2a6a66; }
  .dir-override .speed-slider { background: #173433; }
  .dir-override .speed-slider::-webkit-slider-thumb { background: #2ee6d6; box-shadow: 0 0 8px rgba(46,230,214,.6); }
  .dir-override .speed-val { color: #2ee6d6; }
  .dir-override .tp { background: #0a0c0e; border-bottom: 1px solid #11201f; }
  .dir-override .live-pos { color: #4ade80; }
  .dir-override .save-btn { background: rgba(74,222,128,.08); color: #4ade80; border: 1px solid #2a6a3a; }
  .dir-override .save-btn:hover { background: rgba(74,222,128,.16); }
  .dir-override .tp-btn { background: rgba(255,61,166,.08); color: #ff3da6; border: 1px solid #6a2a52; }
  .dir-override .tp-btn:hover { background: rgba(255,61,166,.16); }
  .dir-override .saved { color: #4ade80; }
  .dir-override .coords label { color: #2ee6d6; }
  .dir-override .coords input { background: #0c0f11; color: #8ad6cf; border-color: #173433; }
  .dir-override .coords input:focus { border-color: #2ee6d6; }
  .dir-override .go-btn { background: transparent; color: #2ee6d6; border: 1px solid #2ee6d6; }
  .dir-override .log-wrap { background: #060708; }
  .dir-override .log-title { color: #2a6a66; }
  .dir-override .log { background: #050607; border: 1px solid #11201f; color: #2ee6d6; }
  .dir-override .log .ok { color: #4ade80; } .dir-override .log .info { color: #2a8a82; } .dir-override .log .warn { color: #ff3da6; } .dir-override .log .ts { color: #2a4a48; }
</style>
</head>
<body>
<div class="canvas">
  <div class="page-title">Crimson Desert Trainer — Theme Switcher</div>
  <div class="page-sub">pick a theme · live bars, toggles &amp; log are interactive</div>
  <div class="switcher" id="switcher"></div>
  <div class="stage" id="stage"></div>
</div>

<script>
const WINDOW_HTML = `
  <div class="tb">
    <span class="tb-text">Crimson Desert Trainer&nbsp;&nbsp;&middot;&nbsp;&nbsp;BY PARRITO</span>
    <div class="tb-dots"><span class="d-close"></span><span class="d-min"></span><span class="d-max"></span></div>
  </div>
  <div class="hd">
    <div class="hd-title">Crimson Desert Trainer</div>
    <div class="status"><span class="dot">&#9679;</span><span class="stxt">ATTACHED &mdash; CrimsonDesert.exe</span></div>
  </div>
  <div class="ent">
    <button class="find-btn">Find Entity</button>
    <span class="ent-lbl">Entity&nbsp;&nbsp;0x7FF812A4C8B0</span>
  </div>
  <div class="sect">Live Stats</div>
  <div class="stats">
    <div class="stat"><span class="stat-lbl">HP</span><div class="bar"><div class="bar-fill hp" style="width:100%"></div></div><span class="stat-val v-hp">5,000 / 5,000</span></div>
    <div class="stat"><span class="stat-lbl">STA</span><div class="bar"><div class="bar-fill sta" style="width:72%"></div></div><span class="stat-val v-sta">2,160 / 3,000</span></div>
    <div class="stat"><span class="stat-lbl">SPI</span><div class="bar"><div class="bar-fill spi" style="width:86%"></div></div><span class="stat-val v-spi">3,870 / 4,500</span></div>
  </div>
  <div class="sect">Cheats</div>
  <div class="cheats">
    <div class="crow"><button class="cheat-btn active" data-idx="0"><span class="ind"></span><span>Infinite Health</span></button><span class="hk">F1</span></div>
    <div class="crow"><button class="cheat-btn active" data-idx="1"><span class="ind"></span><span>Infinite Stamina</span></button><span class="hk">F2</span></div>
    <div class="crow"><button class="cheat-btn" data-idx="2"><span class="ind"></span><span>Infinite Spirit</span></button><span class="hk">F3</span></div>
    <div class="crow"><button class="cheat-btn" data-idx="3"><span class="ind"></span><span>God Mode</span></button><span class="hk">F4</span></div>
    <div class="divider"><span>Combat</span></div>
    <div class="crow"><button class="cheat-btn active" data-idx="4"><span class="ind"></span><span>Freeze Position</span></button><span class="hk">F5</span></div>
    <div class="crow"><button class="cheat-btn" data-idx="5"><span class="ind"></span><span>One-Hit Kill</span></button><span class="hk">F6</span></div>
    <div class="crow"><button class="cheat-btn" data-idx="6"><span class="ind"></span><span>No Fall Damage</span></button><span class="hk">F7</span></div>
    <div class="divider"><span>Movement</span></div>
    <div class="speed-row"><button class="speed-btn"><span class="ind"></span><span>Speed Multiplier</span></button><input type="range" class="speed-slider" min="2" max="50" value="20"><span class="speed-val">2.0&times;</span><span class="speed-hk">F8</span></div>
  </div>
  <div class="sect">Teleport</div>
  <div class="tp">
    <div class="live-pos">Current&nbsp;&nbsp;X=1284.5&nbsp;&nbsp;Y=320.0&nbsp;&nbsp;Z=-842.3</div>
    <div class="tp-btns"><button class="save-btn">Save Position</button><button class="tp-btn">Teleport Here</button></div>
    <div class="saved">Saved&nbsp;&nbsp;X=1284.50&nbsp;&nbsp;Y=320.00&nbsp;&nbsp;Z=-842.30</div>
    <div class="coords"><label>X</label><input value="1284.50"><label>Y</label><input value="320.00"><label>Z</label><input value="-842.30"><button class="go-btn">Go</button></div>
  </div>
  <div class="log-wrap">
    <div class="log-title">Log</div>
    <div class="log"></div>
  </div>
`;

const DIRECTIONS = [
  { id: 'forge',     name: '01 · Midnight Forge', sub: 'Refined dark cheat-tool',        on: '\u25B6', off: '\u25A0' },
  { id: 'atelier',   name: '02 · Atelier',        sub: 'Sleek, minimal, light',          on: '\u25CF', off: '\u25CB' },
  { id: 'sandsworn', name: '03 · Sandsworn',      sub: 'Crimson Desert lore, ornate',    on: '\u25C6', off: '\u25C7' },
  { id: 'override',  name: '04 · Override',       sub: 'Cyberpunk hacker terminal',      on: '\u25AE', off: '\u25AF' },
];

const SEED_LOG = [
  ['13:04:22', 'Trainer started. Waiting for Crimson Desert\u2026', 'info'],
  ['13:04:23', 'Attached to CrimsonDesert.exe', 'ok'],
  ['13:04:23', 'Hotkeys: F1\u2013F4 Stats &nbsp; F5\u2013F7 Combat &nbsp; F8 Speed', 'info'],
  ['13:04:31', 'Scanning for player entity\u2026', 'info'],
  ['13:04:33', 'Entity found at 0x7FF812A4C8B0', 'ok'],
  ['13:04:35', 'Infinite Health: ENABLED', 'ok'],
  ['13:04:36', 'Infinite Stamina: ENABLED', 'ok'],
  ['13:04:40', 'Freeze Position: ENABLED', 'ok'],
];

const SWATCH = { forge: '#e0383c', atelier: '#12a06a', sandsworn: '#c9a24b', override: '#2ee6d6' };

const stage = document.getElementById('stage');
const switcher = document.getElementById('switcher');
let current = null;

function buildWindow(d) {
  const win = document.createElement('div');
  win.className = 'trainer dir-' + d.id;
  win.dataset.on = d.on;
  win.dataset.off = d.off;
  win.innerHTML = WINDOW_HTML;
  return win;
}

function selectTheme(d) {
  stage.innerHTML = '';
  const win = buildWindow(d);
  stage.appendChild(win);
  initTrainer(win, d);
  switcher.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('sel', b.dataset.id === d.id));
  localStorage.setItem('cdt-theme', d.id);
}

DIRECTIONS.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'theme-btn';
  btn.dataset.id = d.id;
  btn.innerHTML = '<span class="swatch" style="background:' + SWATCH[d.id] + '"></span>' + d.name.replace(/^\d+\s*·\s*/, '');
  btn.addEventListener('click', () => selectTheme(d));
  switcher.appendChild(btn);
});

const saved = localStorage.getItem('cdt-theme');
selectTheme(DIRECTIONS.find(d => d.id === saved) || DIRECTIONS[0]);

function nowStamp() {
  const n = new Date();
  return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0') + ':' + String(n.getSeconds()).padStart(2,'0');
}

function initTrainer(win, d) {
  const on = win.dataset.on, off = win.dataset.off;
  const log = win.querySelector('.log');

  function addLog(msg, cls) {
    log.innerHTML += '<br><span class="ts">[' + nowStamp() + ']</span> <span class="' + (cls||'info') + '">' + msg + '</span>';
    log.scrollTop = log.scrollHeight;
  }
  // seed log
  log.innerHTML = SEED_LOG.map(l => '<span class="ts">[' + l[0] + ']</span> <span class="' + l[2] + '">' + l[1] + '</span>').join('<br>');
  log.scrollTop = log.scrollHeight;

  // cheat toggles
  win.querySelectorAll('.cheat-btn').forEach(btn => {
    const ind = btn.querySelector('.ind');
    ind.textContent = btn.classList.contains('active') ? on : off;
    const name = btn.querySelector('span:last-child').textContent;
    btn.addEventListener('click', () => {
      const active = btn.classList.toggle('active');
      ind.textContent = active ? on : off;
      addLog(name + ': ' + (active ? 'ENABLED' : 'DISABLED'), active ? 'ok' : 'warn');
    });
  });

  // speed
  const speedBtn = win.querySelector('.speed-btn');
  const speedInd = speedBtn.querySelector('.ind');
  const slider = win.querySelector('.speed-slider');
  const sval = win.querySelector('.speed-val');
  speedInd.textContent = off;
  speedBtn.addEventListener('click', () => {
    const active = speedBtn.classList.toggle('active');
    speedInd.textContent = active ? on : off;
    addLog('Speed Multiplier (' + sval.textContent + '): ' + (active ? 'ENABLED' : 'DISABLED'), active ? 'ok' : 'warn');
  });
  slider.addEventListener('input', () => { sval.textContent = (slider.value / 10).toFixed(1) + '\u00D7'; });

  // entity / teleport buttons
  win.querySelector('.find-btn').addEventListener('click', () => addLog('Entity re-scan \u2192 0x7FF812A4C8B0', 'ok'));
  win.querySelector('.save-btn').addEventListener('click', () => addLog('Position saved: X=1284.5 Y=320.0 Z=-842.3', 'ok'));
  win.querySelector('.tp-btn').addEventListener('click', () => addLog('Teleported to saved position', 'ok'));
  win.querySelector('.go-btn').addEventListener('click', () => {
    const v = win.querySelectorAll('.coords input');
    addLog('Teleport \u2192 X=' + v[0].value + ' Y=' + v[1].value + ' Z=' + v[2].value, 'ok');
  });

  // live bars
  const state = {
    hp:  { fill: win.querySelector('.hp'),  val: win.querySelector('.v-hp'),  pct: 1.00, max: 5000 },
    sta: { fill: win.querySelector('.sta'), val: win.querySelector('.v-sta'), pct: 0.72, max: 3000, drain: 0.012 },
    spi: { fill: win.querySelector('.spi'), val: win.querySelector('.v-spi'), pct: 0.86, max: 4500, drain: 0.009 },
  };
  const livePos = win.querySelector('.live-pos');

  setInterval(() => {
    const healthOn  = win.querySelector('[data-idx="0"]').classList.contains('active');
    const staminaOn = win.querySelector('[data-idx="1"]').classList.contains('active');
    const spiritOn  = win.querySelector('[data-idx="2"]').classList.contains('active');
    const frozen    = win.querySelector('[data-idx="4"]').classList.contains('active');

    state.hp.pct  = healthOn  ? 1.0 : Math.max(0.06, state.hp.pct - 0.02);
    if (!healthOn && state.hp.pct <= 0.06) state.hp.pct = 1.0;
    state.sta.pct = staminaOn ? 1.0 : Math.max(0.06, state.sta.pct - state.sta.drain);
    if (!staminaOn && state.sta.pct <= 0.06) state.sta.pct = 1.0;
    state.spi.pct = spiritOn  ? 1.0 : Math.max(0.06, state.spi.pct - state.spi.drain);
    if (!spiritOn && state.spi.pct <= 0.06) state.spi.pct = 1.0;

    ['hp','sta','spi'].forEach(k => {
      const b = state[k];
      b.fill.style.width = (b.pct * 100).toFixed(1) + '%';
      b.val.innerHTML = Math.round(b.pct * b.max).toLocaleString() + ' / ' + b.max.toLocaleString();
    });

    if (frozen) {
      livePos.innerHTML = 'Current&nbsp;&nbsp;X=1284.5&nbsp;&nbsp;Y=320.0&nbsp;&nbsp;Z=-842.3&nbsp;&nbsp;[FROZEN]';
    } else {
      const t = Date.now() / 800;
      livePos.innerHTML = 'Current&nbsp;&nbsp;X=' + (1284.5 + Math.sin(t)*5).toFixed(1) +
        '&nbsp;&nbsp;Y=' + (320.0 + Math.cos(t*0.7)*2).toFixed(1) +
        '&nbsp;&nbsp;Z=-' + (842.3 + Math.sin(t*1.3)*3).toFixed(1);
    }
  }, 320);
}
</script>
</body>
</html>
